{% extends "base.html" %}
{% block title %}Login Administrativo — UMarket{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="h3 mb-1">Painel Administrativo</h1>
        <p class="text-muted mb-4">Acesso restrito a administradores do UMarket.</p>

        <form method="POST" action="{{ url_for('auth.admin_login') }}">
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Entrar</button>
        </form>
        <p class="text-center mt-3">
            <a href="{{ url_for('cliente.index') }}">← Voltar para a loja</a>
        </p>
    </div>
</div>
{% endblock %}
